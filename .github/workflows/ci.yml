name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Test, Lint, Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Type check
        run: npx tsc --noEmit

      - name: Build extension
        run: npm run build:ext

      - name: Build webview
        run: npm run build:webview

      - name: Run tests (node runner)
        run: npm test

      - name: Run tests (jest)
        run: npm run test:unit

      - name: Lint
        run: npm run lint
