name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  trufflehog:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@17456f8c7d042d8c82c9a8ca9e937231f9f42e26
        with:
          extra_args: --only-verified

  ci:
    name: Build, Test, Lint, Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Repair native optional bindings
        run: npm run deps:repair-native

      - name: Verify native bindings
        run: |
          node -e "require('@rolldown/binding-linux-x64-gnu')"
          node -e "require('@unrs/resolver-binding-linux-x64-gnu')"

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Type check
        run: npx tsc --noEmit

      - name: Build extension
        run: npm run build:ext

      - name: Build webview
        run: npm run build:webview

      - name: Run tests (jest)
        run: npm run test:unit

      - name: Lint
        run: npm run lint
